<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0A0E14">
  <meta name="description" content="GranCarta - Panel administrativo">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>GranCarta · Admin</title>

  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap">

  <link rel="stylesheet" href="css/style.css">

  <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230A0E14'/%3E%3Crect x='25' y='25' width='50' height='50' rx='12' fill='%232563EB'/%3E%3Ctext x='50' y='62' font-family='Inter,sans-serif' font-size='32' fill='%23ffffff' text-anchor='middle' font-weight='600'%3EG%3C/text%3E%3C/svg%3E">
</head>
<body>

  <!-- ====================================================== -->
  <!-- PANTALLA: LOGIN (paso 1 - mail)                        -->
  <!-- ====================================================== -->
  <section id="screen-login-mail" class="screen screen-login is-active">
    <div class="login-container">
      <div class="login-brand">
        <div class="brand-mark">G</div>
        <div class="brand-name">GranCarta</div>
        <div class="brand-tagline">Panel administrativo</div>
      </div>

      <form id="form-login-mail" class="login-form" onsubmit="solicitarCodigo(event)">
        <label class="login-label" for="input-mail">Mail del administrador</label>
        <input type="email"
               id="input-mail"
               class="login-input"
               placeholder="tu@empresa.com"
               autocomplete="email"
               required
               autofocus>
        <button type="submit" class="login-btn" id="btn-solicitar-codigo">
          Pedir código
        </button>
        <div class="login-status" id="login-status-1"></div>
      </form>

      <div class="login-footer">
        <small>Te enviaremos un código de acceso por mail</small>
      </div>
    </div>
  </section>

  <!-- ====================================================== -->
  <!-- PANTALLA: LOGIN (paso 2 - código)                      -->
  <!-- ====================================================== -->
  <section id="screen-login-code" class="screen screen-login">
    <div class="login-container">
      <div class="login-brand">
        <div class="brand-icon-mail">📩</div>
        <div class="brand-name">Revisá tu mail</div>
        <div class="brand-tagline" id="mail-display">…</div>
      </div>

      <form id="form-login-code" class="login-form" onsubmit="verificarCodigo(event)">
        <label class="login-label" for="input-code">Código de 6 dígitos</label>
        <input type="text"
               id="input-code"
               class="login-input login-input-code"
               placeholder="000000"
               inputmode="numeric"
               pattern="[0-9]{6}"
               maxlength="6"
               autocomplete="one-time-code"
               required
               autofocus>
        <button type="submit" class="login-btn" id="btn-verificar-codigo">
          Ingresar
        </button>
        <div class="login-status" id="login-status-2"></div>
      </form>

      <button class="login-back" onclick="volverALoginMail()">← Cambiar mail</button>
    </div>
  </section>

  <!-- ====================================================== -->
  <!-- PANTALLA: DASHBOARD                                    -->
  <!-- ====================================================== -->
  <section id="screen-dashboard" class="screen">

    <header class="dash-header">
      <div class="dash-header-left">
        <div class="brand-mark brand-mark-sm">G</div>
        <div>
          <div class="dash-title">GranCarta</div>
          <div class="dash-subtitle" id="dash-account-info">Cargando…</div>
        </div>
      </div>
      <div class="dash-header-right">
        <button class="btn-icon" onclick="cerrarSesion()" title="Cerrar sesión">
          🚪
        </button>
      </div>
    </header>

    <main class="dash-main">

      <!-- Stats summary -->
      <section class="dash-stats" id="dash-stats">
        <!-- generated by JS -->
      </section>

      <!-- Empresas -->
      <section class="dash-section">
        <div class="dash-section-header">
          <h2 class="dash-section-title">Empresas</h2>
          <button class="btn btn-primary" onclick="iniciarWizardEmpresa()">
            <span>+</span>
            <span>Nueva empresa</span>
          </button>
        </div>
        <div class="empresas-list" id="empresas-list">
          <!-- generated by JS -->
        </div>
      </section>

    </main>
  </section>

  <!-- ====================================================== -->
  <!-- PANTALLA: WIZARD (genérico, reutilizable)              -->
  <!-- ====================================================== -->
  <section id="screen-wizard" class="screen screen-wizard">
    <div class="wizard-bg"></div>
    <div class="wizard-container">

      <header class="wizard-header">
        <div class="wizard-brand">
          <div class="brand-mark brand-mark-sm">G</div>
          <span>GranCarta</span>
        </div>
        <div class="wizard-progress" id="wizard-progress">
          <!-- dots generated by JS -->
        </div>
        <button class="wizard-close" onclick="cancelarWizard()" title="Cancelar">×</button>
      </header>

      <div class="wizard-content" id="wizard-content">
        <!-- step content generated by JS -->
      </div>

      <footer class="wizard-actions" id="wizard-actions">
        <!-- back / next buttons generated by JS -->
      </footer>

    </div>
  </section>

  <!-- ====================================================== -->
  <!-- COMPONENTES GLOBALES                                   -->
  <!-- ====================================================== -->

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-spinner"></div>
  </div>

  <!-- Confirm dialog -->
  <div id="confirm-overlay" class="confirm-overlay">
    <div class="confirm-box">
      <div class="confirm-title" id="confirm-title">¿Estás seguro?</div>
      <div class="confirm-message" id="confirm-message"></div>
      <div class="confirm-actions">
        <button class="btn btn-secondary" id="confirm-cancel">Cancelar</button>
        <button class="btn btn-primary" id="confirm-ok">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- ====================================================== -->
  <!-- SCRIPTS                                                 -->
  <!-- ====================================================== -->
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/wizard.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
